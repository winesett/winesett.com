<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="keywords" content="synthrosis, AI wisdom, human-AI synthesis, pattern recognition, emergent understanding">
  <meta name="description" content="synthrosis: the emergent wisdom patterns revealed through combined human experience and artificial intelligence pattern recognition.">
  <title>synthrosis</title>
  <style>
    /* Global Styles */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #000000;
      color: #ffffff;
      font-family: Palatino, Georgia, serif;
      overflow-x: hidden;
    }
    
    /* Centering container */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      min-height: 100vh;
    }
    
    .container {
      max-width: 800px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    
    /* Fade-in animation */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    
    h1, .definition, footer {
      opacity: 0;
      animation: fadeIn 0.8s ease-in forwards;
    }
    
    /* Title styling */
    h1 {
      margin: 0 0 20px;
      font-size: 3em;
    }
    
    h1 small {
      display: block;
      font-size: 0.5em;
      margin-top: 10px;
    }
    
    /* Definition styling */
    .definition {
      font-size: 1.2em;
      line-height: 1.6;
      animation-delay: 0.8s;
      margin: 0;
    }
    
    /* Footer styling */
    footer {
      position: absolute;
      bottom: 20px;
      width: 100%;
      font-family: Karla, system-ui, sans-serif;
      font-size: 0.8em;
      animation-delay: 1.6s;
    }
    
    /* Optional: Subtle dark pattern overlay for depth */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      /* Using a repeating linear gradient for a subtle texture */
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.03) 0,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 10px
      );
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      synthrosis
      <small>(sin-THRO-sis)</small>
    </h1>
    <p class="definition">
      synthrosis (n.): the emergent wisdom patterns revealed through combined human experience and advanced intelligence pattern recognition, resulting in new understanding previously inaccessible to either system alone.
    </p>
  </div>
  <footer>© 2025</footer>
</body>
</html>
