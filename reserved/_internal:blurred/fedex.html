<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FedEx Case Study</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

    <!-- Blurred Teaser Content -->
    <div class="max-w-5xl mx-auto px-6 py-12 blur-sm select-none">
        <h1 class="text-5xl font-semibold tracking-tight mb-4">FedEx Enterprise Tools</h1>
        <p class="text-xl text-zinc-400 mb-8">2023 — 2024</p>

        <!-- Replace with your actual blurred/summary content -->
        <div class="space-y-6">
            <img src="https://picsum.photos/id/1015/1200/600" class="w-full rounded-2xl" alt="Blurred preview">
            <div class="prose prose-invert max-w-none">
                <p>This is a blurred preview of the case study. The full version is available with the password.</p>
            </div>
        </div>
    </div>

    <!-- Password Modal -->
    <div id="password-modal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-zinc-900 border border-white/10 rounded-3xl p-8 w-full max-w-md mx-4">
            <h2 class="text-2xl font-semibold mb-2">Reserved Case Study</h2>
            <p class="text-zinc-400 mb-6">Enter the password to view the full case study.</p>

            <form id="password-form">
                <input 
                    type="password" 
                    id="password-input"
                    class="w-full bg-zinc-800 border border-white/20 rounded-2xl px-5 py-4 mb-4 focus:outline-none text-lg"
                    placeholder="Enter password"
                    required
                >
                <button 
                    type="submit"
                    class="w-full bg-white text-black font-medium py-4 rounded-2xl text-lg hover:bg-zinc-200 transition">
                    Unlock Case Study
                </button>
            </form>

            <p id="error-message" class="text-red-400 text-sm mt-4 hidden text-center">
                Incorrect password. Please try again.
            </p>
        </div>
    </div>

    <script>
        // Simple inline version for now
        const form = document.getElementById('password-form');
        const modal = document.getElementById('password-modal');
        const errorMsg = document.getElementById('error-message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const password = document.getElementById('password-input').value;

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });

            if (res.ok) {
                window.location.reload(); // Reload to get full version
            } else {
                errorMsg.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
